services:
  frontier:
    build:
      context: .
      target: ${FRONTIER_DOCKER_TARGET:-runtime}
    container_name: frontier
    init: true
    shm_size: "1gb"
    ports:
      - "3000:8080"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
    restart: unless-stopped
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    # Read-only root filesystem with writable volumes
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=256M
    volumes:
      - ./env.toml:/app/env.toml:ro
      - ./mcp.json:/app/mcp.json:ro
      - ./frontier.db:/app/frontier.db
      - frontier_cache:/app/cache

volumes:
  frontier_cache:
    driver: local
