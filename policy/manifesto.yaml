version: "1.0"
metadata:
  name: frontier-policy
  description: Frontier QQ bot security and governance policies

policies:
  access_control:
    type: builtin
    class_path: policy.policies.access_control.AccessControlPolicy
    description: 用户和群组的黑白名单访问控制

  content_safety:
    type: builtin
    class_path: policy.policies.content_safety.ContentSafetyPolicy
    description: 文本和图片的内容安全检测

intervention_points:
  input:
    - policy: access_control
      config:
        whitelist_mode: false
        whitelist_persons: []
        whitelist_groups: []
        blacklist_persons: [2085003190]
        blacklist_groups: []
        bot_name_prefixes:
          - "小李子"
          - "小栗子"
        test_group_ids: []
      default_decision: deny

    - policy: content_safety
      config:
        direction: input
        severity: safety
        text_enabled: false
        image_enabled: false
        text_model: Qwen/Qwen3Guard-Gen-0.6B
        image_model: Falconsai/nsfw_image_detection
        on_model_error: allow
        unsafe_reaction: 26
        controversial_reaction: 212
        safe_reaction: 32
      default_decision: allow

  output:
    - policy: content_safety
      config:
        direction: output
        severity: safety
        text_enabled: false
        text_model: Qwen/Qwen3Guard-Gen-0.6B
        on_model_error: allow
        block_message: "⚠️ 内容被安全策略拦截"
      default_decision: allow
